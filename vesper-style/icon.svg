<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vesper Style icon</title>
  <desc id="desc">A warm editorial document surface against a golden-hour-to-twilight backdrop with a stylized V mark.</desc>
  <defs>
    <linearGradient id="bg" x1="36" y1="28" x2="220" y2="228" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2E7D3"/>
